# Cohort-level constants for the Duszkiewicz 2026 dataset.
# Per-session / per-subject metadata (genotype, probe locations, epochs, etc.) lives in the
# metadata xlsx; constants shared across the cohort live here.
Task:
  sleep:
    description: The rat was given a sleep opportunity in a container placed inside the recording arena, during which recordings continued.
    environment: sleep_container
    camera_id: 1
  wake_cue_rot:
    description: The rat was awake and foraging for scattered cereal in a cylindrical open field while a prominent visual cue on the arena wall was rotated between trials to probe visual reorientation of the head-direction system.
    environment: cylindrical_open_field
    camera_id: 1

Video:
  ImageSeries:
    - name: Video1
      description: Video during epoch 1 (sleep). Video capturing and marker tracking were performed using Bonsai software at 40 Hz. Images were acquired through an acA1300-75gc Basler camera with a LMVZ4411 Kowa lens, positioned at the ceiling of the rig. This camera was connected to the OpenEphys board, sending a pulse for each frame taken, allowing the synchronisation of the two streams of information.
    - name: Video2
      description: Video during epoch 2 (wake_cue_rot). Video capturing and marker tracking were performed using Bonsai software at 40 Hz. Images were acquired through an acA1300-75gc Basler camera with a LMVZ4411 Kowa lens, positioned at the ceiling of the rig. This camera was connected to the OpenEphys board, sending a pulse for each frame taken, allowing the synchronisation of the two streams of information.
  CameraDevice:
    name: camera_device 1
    description: Images were acquired through an acA1300-75gc Basler camera with a LMVZ4411 Kowa lens, positioned at the ceiling of the rig.
    lens: LMVZ4411 Kowa Lens
    camera_name: Basler Camera
    model:
      name: CameraDeviceModel
      description: Images were acquired through an acA1300-75gc Basler camera with a LMVZ4411 Kowa lens, positioned at the ceiling of the rig.
      manufacturer: Basler
      model_number: acA1300-75gc

probe:
  - name: probe_1
    reference: A silver ground wire was attached to one of the skull screws placed above the cerebellum as the reference.
    data_acquisition_description: For recording, the implanted silicon probes were connected to an Intan RHD headstage (Intan technologies). The headstage was connected to an Intan RHD standard SPI cable, which was connected to a 3D-printed commutator in the ceiling (custom-made in house). Signals were acquired at 30kHz with an OpenEphys data acquisition system.
    data_acquisition_system: OpenEphys
    data_acuisition_amplifier: Intan RHD amplifier chip
    data_acquisition_adc_circuit: Intan RHD adc circuit
  - name: probe_2
    reference: A silver ground wire was attached to one of the skull screws placed above the cerebellum as the reference.
